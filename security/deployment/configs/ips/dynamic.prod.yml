serversTransports:
  vegamaps-transport:
    certificates:
      - ca: /etc/traefik/certs/ca.crt

http:
  middlewares:
    crowdsec-bouncer:
      forwardAuth:
        address: http://bouncer-traefik:8080/api/v1/forwardAuth
        trustForwardHeader: true

  routers:
    frontend-router:
      rule: "Host(`app.vegamaps.ru`)"
      entryPoints:
        - websecure
      middlewares:
        - crowdsec-bouncer
      service: external-frontend
      tls:
        certResolver: letsencrypt

  services:
    external-frontend:
      loadBalancer:
        servers:
          - url: "https://app.vegamaps.ru:443"
        serversTransport: vegamaps-transport