version: '3.8'

networks:
  proxy:
    name: proxy

volumes:
  traefik-logs:
    name: traefik-logs
  crowdsec-db:
    name: crowdsec-db
  crowdsec-config:
    name: crowdsec-config

services:
  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    command:
      - --configFile=/etc/traefik/traefik.yml
    networks:
      - proxy
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../configs/ips/traefik.dev.yml:/etc/traefik/traefik.yml:ro
      - traefik-logs:/var/log/traefik:rw
    labels:
      - "traefik.enable=true"
      
      # Define bouncer middleware (forwardAuth) – corrected container name
      - "traefik.http.middlewares.crowdsec-bouncer.forwardauth.address=http://bouncer-traefik-dev:8080/api/v1/forwardAuth"
      - "traefik.http.middlewares.crowdsec-bouncer.forwardauth.trustforwardheader=true"
      
      # Dashboard router – corrected middleware reference
      - "traefik.http.routers.dashboard.rule=Host(`vegamaps.ru`)"
      - "traefik.http.routers.dashboard.entrypoints=web"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=crowdsec-bouncer"

  crowdsec:
    image: crowdsecurity/crowdsec:v1.6.6
    container_name: crowdsec
    restart: unless-stopped
    environment:
      COLLECTIONS: "crowdsecurity/linux crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/appsec-generic-rules"
      CUSTOM_HOSTNAME: crowdsec
      BOUNCER_KEY_PLUGIN: ${BOUNCER_KEY_PLUGIN}
    networks:
      - proxy
    volumes:
      - ../configs/ips/crowdsec.dev.yml:/etc/crowdsec/crowdsec.yml:ro
      - ../configs/ips/acquis.dev.yaml:/etc/crowdsec/acquis.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-logs:/var/log/traefik:ro
      - crowdsec-db:/var/lib/crowdsec/data
      - crowdsec-config:/etc/crowdsec
    depends_on:
      - traefik

  bouncer-traefik:
    image: fbonalair/traefik-crowdsec-bouncer:0.4.0
    container_name: bouncer-traefik-dev
    restart: unless-stopped
    environment:
      CROWDSEC_BOUNCER_API_KEY: ${BOUNCER_KEY_PLUGIN}
      CROWDSEC_AGENT_HOST: crowdsec:8080
      LOG_LEVEL: debug
    networks:
      - proxy
    depends_on:
      - crowdsec