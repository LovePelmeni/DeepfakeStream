version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - elastic

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - XPACK_SECURITY_ENABLED=false
      - XPACK_FLEET_ENABLED=true
      - XPACK_FLEET_AGENT_ID_VERIFICATION_ENABLED=false   # allow HTTP for Fleet Server
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - elastic

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.0
    container_name: logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      - XPACK_MONITORING_ENABLED=false
    ports:
      - "5044:5044"
      - "9600:9600"
    depends_on:
      - elasticsearch
    networks:
      - elastic

  fleet-server:
    image: docker.elastic.co/beats/elastic-agent:8.15.0
    container_name: fleet-server
    environment:
      - FLEET_SERVER_ENABLE=true
      - FLEET_SERVER_ELASTICSEARCH_HOST=http://elasticsearch:9200
      - FLEET_SERVER_ELASTICSEARCH_USERNAME=elastic
      - FLEET_SERVER_ELASTICSEARCH_PASSWORD=changeme   # no security, any value works
      - FLEET_SERVER_SERVICE_TOKEN=      # leave empty for dev
      - FLEET_SERVER_POLICY_ID=
    ports:
      - "8220:8220"
    depends_on:
      - elasticsearch
    networks:
      - elastic
    # In dev, Fleet Server can be started without a policy ID;
    # the first run will create one (but you may need to generate token manually)

networks:
  elastic:
    driver: bridge

volumes:
  es_data: