---
- name: Deploy Nomad clients
  hosts: nomad_clients
  become: yes
  vars_files:
    - ../group_vars/nomad_clients.yml

  tasks:
    - name: Unarchive Nomad binary from local file
      unarchive:
        src: "{{ playbook_dir }}/../../files/nomad/nomad_{{ nomad_version }}_linux_amd64.zip"
        dest: /usr/local/bin
        owner: root
        group: root
        mode: 0755
        remote_src: no

    - name: Create nomad system user
      user:
        name: nomad
        system: yes
        shell: /bin/false
        create_home: no

    - name: Create Nomad directories
      file:
        path: "{{ item }}"
        state: directory
        owner: nomad
        group: nomad
        mode: 0750
      loop:
        - /etc/nomad.d
        - /var/lib/nomad

    - name: Render client configuration file
      template:
        src: "{{ playbook_dir }}/../../templates/nomad/client.hcl.j2"
        dest: /etc/nomad.d/nomad.hcl
        owner: nomad
        group: nomad
        mode: 0640
      notify: restart nomad

    - name: Install Nomad systemd service unit
      template:
        src: "{{ playbook_dir }}/../../templates/nomad/nomad.service.j2"
        dest: /etc/systemd/system/nomad.service
        mode: 0644
      notify: restart nomad

    - name: Enable and start Nomad service
      systemd:
        name: nomad
        enabled: yes
        state: started
        daemon_reload: yes

  handlers:
    - name: restart nomad
      systemd:
        name: nomad
        state: restarted
        daemon_reload: yes