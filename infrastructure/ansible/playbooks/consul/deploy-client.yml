---
- name: Deploy Consul clients
  hosts: consul_clients
  become: yes
  vars:
    consul_version: "1.19.2"
    consul_user: "consul"
    consul_group: "consul"
    consul_data_dir: "/opt/consul/data"
    consul_config_dir: "/etc/consul.d"
    consul_ssl_dir: "/etc/consul/ssl"
    # Gossip key (same as servers)
    consul_gossip_key: "{{ vault_consul_gossip_key }}"
    # Agent token for registering services (from ACL bootstrap)
    consul_agent_token: "{{ vault_consul_agent_token }}"

  tasks:
    - name: Install dependencies
      apt:
        name: [gnupg, curl, unzip]
        state: present
        update_cache: yes

    - name: Add HashiCorp GPG key
      apt_key:
        url: https://apt.releases.hashicorp.com/gpg
        state: present

    - name: Add HashiCorp repository
      apt_repository:
        repo: "deb [arch=amd64] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
        state: present
        update_cache: yes

    - name: Install Consul
      apt:
        name: consul={{ consul_version }}
        state: present
        allow_downgrade: yes

    - name: Create Consul directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ consul_user }}"
        group: "{{ consul_group }}"
        mode: 0750
      loop:
        - "{{ consul_config_dir }}"
        - "{{ consul_data_dir }}"
        - "{{ consul_ssl_dir }}"

    - name: Copy client configuration file (client.hcl)
      copy:
        src: "files/consul/client.hcl"
        dest: "{{ consul_config_dir }}/consul.hcl"
        owner: "{{ consul_user }}"
        group: "{{ consul_group }}"
        mode: 0640
      notify: restart consul

    - name: Copy CA certificate (required for auto‑encrypt)
      copy:
        src: "files/consul/ssl/ca.pem"
        dest: "{{ consul_ssl_dir }}/ca.pem"
        owner: "{{ consul_user }}"
        group: "{{ consul_group }}"
        mode: 0640

    - name: Ensure gossip encryption key is set
      lineinfile:
        path: "{{ consul_config_dir }}/consul.hcl"
        regexp: '^encrypt = '
        line: 'encrypt = "{{ consul_gossip_key }}"'
      notify: restart consul

    - name: Set ACL agent token
      lineinfile:
        path: "{{ consul_config_dir }}/consul.hcl"
        insertafter: '^acl {'
        line: '    tokens { agent = "{{ consul_agent_token }}" }'
      when: consul_agent_token != ''
      notify: restart consul

    - name: Enable and start Consul client
      systemd:
        name: consul
        enabled: yes
        state: started
        daemon_reload: yes

  handlers:
    - name: restart consul
      systemd:
        name: consul
        state: restarted
        daemon_reload: yes