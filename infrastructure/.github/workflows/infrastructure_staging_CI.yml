name: Terraform Staging CI

on:
  push:
    branches: [staging]
    paths:
      - 'terraform/**'
      - 'modules/**'
  workflow_dispatch:

env:
  TF_VERSION: '1.6.0'
  WORKING_DIR: 'terraform/staging'
  # Staging Yandex Cloud credentials
  YC_CLOUD_ID: ${{ secrets.STAGING_YC_CLOUD_ID }}
  YC_FOLDER_ID: ${{ secrets.STAGING_YC_FOLDER_ID }}
  YC_TOKEN: ${{ secrets.STAGING_YC_TOKEN }}
  TF_VAR_yandex_cloud_id: ${{ secrets.STAGING_YC_CLOUD_ID }}
  TF_VAR_yandex_cloud_folder_id: ${{ secrets.STAGING_YC_FOLDER_ID }}
  TF_VAR_access_key: ${{ secrets.STAGING_YC_ACCESS_KEY }}
  TF_VAR_secret_key: ${{ secrets.STAGING_YC_SECRET_KEY }}
  # Staging SSH keys
  TF_VAR_bastion_ssh_public_key: ${{ secrets.STAGING_BASTION_SSH_PUBLIC_KEY }}
  TF_VAR_backend_ssh_public_key: ${{ secrets.STAGING_BACKEND_SSH_PUBLIC_KEY }}
  TF_VAR_frontend_ssh_public_key: ${{ secrets.STAGING_FRONTEND_SSH_PUBLIC_KEY }}
  TF_VAR_ml_ssh_public_key: ${{ secrets.STAGING_ML_SSH_PUBLIC_KEY }}
  TF_VAR_ws_ssh_public_key: ${{ secrets.STAGING_WS_SSH_PUBLIC_KEY }}

jobs:
  plan-and-approve:
    name: Plan, Validate & Approve (Staging)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ---------- 1. Init ----------
      - name: Terraform Init
        run: cd ${{ env.WORKING_DIR }} && terraform init

      # ---------- Optional: Format check (non‑blocking) ----------
      - name: Terraform Format
        run: cd ${{ env.WORKING_DIR }} && terraform fmt -check
        continue-on-error: true

      # ---------- 2. Validate (syntax + logic) ----------
      - name: Terraform Validate
        run: cd ${{ env.WORKING_DIR }} && terraform validate

      # ---------- 3. Checkov (best practices) – soft fail (Docker) ----------
      # (Includes custom policies but does NOT fail the pipeline)
      - name: Checkov – Best Practices Scan (soft)
        id: checkov_best
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            bridgecrew/checkov \
            -d /workspace/${{ env.WORKING_DIR }} \
            --external-checks-dir /workspace/checkov_policies \
            --framework terraform \
            --soft-fail \
            --quiet \
            --output cli
        continue-on-error: true   # does not block pipeline

      # ---------- 4. Terraform Plan ----------
      - name: Terraform Plan
        id: plan
        run: cd ${{ env.WORKING_DIR }} && terraform plan -no-color -out=tfplan.binary

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-staging
          path: ${{ env.WORKING_DIR }}/tfplan.binary
          retention-days: 1

      # ---------- 5. Checkov (misconfigurations) – hard fail (Docker) ----------
      # Fails pipeline if any HIGH severity issue (built‑in or custom)
      - name: Checkov – Misconfiguration Scan (hard)
        id: checkov_misconfig
        run: |
          docker run --rm \
            -v $(pwd):/workspace \
            bridgecrew/checkov \
            -d /workspace/${{ env.WORKING_DIR }} \
            --external-checks-dir /workspace/checkov_policies \
            --framework terraform \
            --quiet \
            --output cli \
            --hard-fail-on HIGH
        # No continue-on-error – pipeline stops if any HIGH issue found

      # ---------- 6. Manual Approval (1 approver) ----------
      - name: Request manual approval
        uses: trstringer/manual-approval@v1
        with:
          approvers: "your-username,another-approver"   # replace with real usernames
          secret: ${{ secrets.GITHUB_TOKEN }}
          minimum-approvals: 1
          issue-title: "Deploy to Staging?"
          issue-body: "Terraform plan succeeded and misconfiguration scan passed. Please approve to apply."
          exclude-workflow-initiator-as-approver: false

      # ---------- Output summary ----------
      - name: Plan summary (for logs)
        run: |
          echo "Best practices scan: ${{ steps.checkov_best.outcome }}"
          echo "Misconfiguration scan: ${{ steps.checkov_misconfig.outcome }}"
          echo "Plan ready for apply"

  apply:
    name: Terraform Apply (Staging)
    runs-on: ubuntu-latest
    needs: plan-and-approve
    environment: staging
    concurrency: terraform-staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-staging
          path: ${{ env.WORKING_DIR }}

      - name: Configure Yandex Cloud CLI
        uses: yandex-cloud/yc-github-action@v1
        with:
          token: ${{ secrets.STAGING_YC_TOKEN }}
          cloud-id: ${{ secrets.STAGING_YC_CLOUD_ID }}
          folder-id: ${{ secrets.STAGING_YC_FOLDER_ID }}

      - name: Terraform Init
        run: cd ${{ env.WORKING_DIR }} && terraform init

      - name: Terraform Apply
        id: apply
        run: cd ${{ env.WORKING_DIR }} && terraform apply -auto-approve tfplan.binary

      - name: Generate and Upload Infrastructure Config
        run: |
          cd ${{ env.WORKING_DIR }}
          CONFIG_BUCKET=$(terraform output -raw config_bucket_name)
          cat > infrastructure-config.json << EOF
          {
            "version": "${{ github.sha }}",
            "updated_at": "$(date -Iseconds)",
            "environment": "staging",
            "registry": $(terraform output -json registry 2>/dev/null || echo '{}'),
            "instances": $(terraform output -json instances 2>/dev/null || echo '{}'),
            "storage": $(terraform output -json storage 2>/dev/null || echo '{}'),
            "secrets": $(terraform output -json secrets 2>/dev/null || echo '{}'),
            "service_accounts": $(terraform output -json service_accounts 2>/dev/null || echo '{}'),
            "network": $(terraform output -json network 2>/dev/null || echo '{}')
          }
          EOF
          yc storage object upload \
            --bucket $CONFIG_BUCKET \
            --key infrastructure-config.json \
            --file infrastructure-config.json \
            --content-type application/json
          echo "✅ Config uploaded to $CONFIG_BUCKET"

      - name: Notify Success
        run: echo "✅ Staging deployment complete"