name: ML Service CD - Production

on:
  repository_dispatch:
    types: [deploy-to-production]
  workflow_dispatch:
    inputs:
      service_name:
        description: "Service to deploy"
        required: true
        type: choice
        options:
          - stockpile-volume
          - hotspot-detection
          - object-detection
          - object-segmentation
          - d3-reconstruction
          - orthomosaic
          - overlap-analysis
      service_version:
        description: "Service version to deploy"
        required: true
        type: string
      model_version:
        description: "Model version"
        required: false
        default: "latest"
      skip_approval:
        description: "Skip approval (emergency only)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: read
  checks: read

env:
  CONFIG_BUCKET: vegamaps-infra-state-bucket
  CONFIG_FILE: infrastructure-production-config.ml.json
  DOCKER_COMPOSE_FILE: deployment/production/docker-compose.prod.yml
  ML_SERVICE_API_VERSION: ${{ vars.ML_SERVICE_API_VERSION || 'v1' }}

jobs:
  resolve-inputs:
    runs-on: [self-hosted, linux, x64]
    outputs:
      service_name: ${{ steps.resolve.outputs.service_name }}
      service_version: ${{ steps.resolve.outputs.service_version }}
      model_version: ${{ steps.resolve.outputs.model_version }}
      skip_approval: ${{ steps.resolve.outputs.skip_approval }}
    steps:
      - name: Resolve inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "service_name=${{ github.event.client_payload.service_name }}" >> "$GITHUB_OUTPUT"
            echo "service_version=${{ github.event.client_payload.service_version }}" >> "$GITHUB_OUTPUT"
            echo "model_version=${{ github.event.client_payload.model_version || 'latest' }}" >> "$GITHUB_OUTPUT"
            echo "skip_approval=false" >> "$GITHUB_OUTPUT"
          else
            echo "service_name=${{ inputs.service_name }}" >> "$GITHUB_OUTPUT"
            echo "service_version=${{ inputs.service_version }}" >> "$GITHUB_OUTPUT"
            echo "model_version=${{ inputs.model_version || 'latest' }}" >> "$GITHUB_OUTPUT"
            echo "skip_approval=${{ inputs.skip_approval }}" >> "$GITHUB_OUTPUT"
          fi

  load-config:
    needs: resolve-inputs
    runs-on: [self-hosted, linux, x64]
    outputs:
      registry_id: ${{ steps.extract.outputs.registry_id }}
      bastion_ip: ${{ steps.extract.outputs.bastion_ip }}
      bastion_user: ${{ steps.extract.outputs.bastion_user }}
      ml_hosts_json: ${{ steps.extract.outputs.ml_hosts_json }}
      db_host: ${{ steps.extract.outputs.db_host }}
      kms_key_id: ${{ steps.extract.outputs.kms_key_id }}
      host_port: ${{ steps.extract.outputs.host_port }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate YC service account secret
        env:
          YC_SA_JSON: ${{ secrets.YC_PRODUCTION_SA_JSON }}
        run: |
          set -euo pipefail
          if [[ -z "${YC_SA_JSON:-}" ]]; then
            echo "YC_PRODUCTION_SA_JSON secret is empty"
            exit 1
          fi
          echo "${YC_SA_JSON}" | jq -e '.id and .service_account_id and .private_key and .public_key' > /dev/null

      - name: Install Yandex Cloud CLI
        run: |
          set -euo pipefail
          curl -sSL https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> "$GITHUB_PATH"

      - name: Get IAM token
        id: iam_token
        env:
          YC_SA_JSON: ${{ secrets.YC_PRODUCTION_SA_JSON }}
        run: |
          set -euo pipefail
          export PATH="$HOME/yandex-cloud/bin:$PATH"
          printf '%s' "$YC_SA_JSON" > /tmp/sa-key.json
          yc config set service-account-key /tmp/sa-key.json >/dev/null
          IAM_TOKEN="$(yc iam create-token)"
          if [ -z "$IAM_TOKEN" ]; then
            echo "Failed to obtain IAM token" >&2
            exit 1
          fi
          {
            echo "iam_token=$IAM_TOKEN"
          } >> "$GITHUB_OUTPUT"

      - name: Get infrastructure configuration
        id: extract
        env:
          CONFIG_BUCKET: ${{ env.CONFIG_BUCKET }}
          CONFIG_FILE: ${{ env.CONFIG_FILE }}
          IAM_TOKEN: ${{ steps.iam_token.outputs.iam_token }}
        run: |
          set -euo pipefail

          curl -fsSL \
            -H "Authorization: Bearer ${IAM_TOKEN}" \
            "https://storage.yandexcloud.net/${CONFIG_BUCKET}/${CONFIG_FILE}" \
            > config.json

          jq empty config.json

          REGISTRY_ID="$(jq -r '.registry.id // empty' config.json)"
          BASTION_IP="$(jq -r '.instances.bastion.private_ip // empty' config.json)"
          BASTION_USER="$(jq -r '.instances.bastion.user // "ubuntu"' config.json)"
          HOST_PORT="$(jq -r '.instances.bastion.ssh_port // 22' config.json)"
          ML_HOSTS_JSON="$(jq -c '.instances.ml_production.private_ips // empty' config.json)"
          DB_HOST="$(jq -r '.database.production.host // empty' config.json)"
          KMS_KEY_ID="$(jq -r '.secrets.kms_key_id // empty' config.json)"

          if [ -z "$REGISTRY_ID" ]; then
            echo "registry.id is missing in config.json"
            exit 1
          fi

          if [ -z "$BASTION_IP" ]; then
            echo "instances.bastion.private_ip is missing in config.json"
            exit 1
          fi

          if [ -z "$ML_HOSTS_JSON" ] || [ "$ML_HOSTS_JSON" = "null" ]; then
            echo "instances.ml_production.private_ips is missing in config.json"
            exit 1
          fi

          if [ -z "$DB_HOST" ]; then
            echo "database.production.host is missing in config.json"
            exit 1
          fi

          if [ -z "$KMS_KEY_ID" ]; then
            echo "secrets.kms_key_id is missing in config.json"
            exit 1
          fi

          echo "registry_id=$REGISTRY_ID" >> "$GITHUB_OUTPUT"
          echo "bastion_ip=$BASTION_IP" >> "$GITHUB_OUTPUT"
          echo "bastion_user=$BASTION_USER" >> "$GITHUB_OUTPUT"
          echo "ml_hosts_json=$ML_HOSTS_JSON" >> "$GITHUB_OUTPUT"
          echo "db_host=$DB_HOST" >> "$GITHUB_OUTPUT"
          echo "kms_key_id=$KMS_KEY_ID" >> "$GITHUB_OUTPUT"
          echo "host_port=$HOST_PORT" >> "$GITHUB_OUTPUT"

  deploy-production:
    needs: [resolve-inputs, load-config]
    strategy:
      fail-fast: false
      matrix:
        host_ip: ${{ fromJson(needs.load-config.outputs.ml_hosts_json) }}
    runs-on: [self-hosted, linux, x64]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Manual approval (production only)
        if: ${{ !fromJson(needs.resolve-inputs.outputs.skip_approval) }}
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: ${{ secrets.PRODUCTION_APPROVERS }}
          minimum-approvals: 2
          issue-title: "Deploy ${{ needs.resolve-inputs.outputs.service_name }} v${{ needs.resolve-inputs.outputs.service_version }} to Production"
          issue-body: |
            🚀 Deployment Request

            Service: ${{ needs.resolve-inputs.outputs.service_name }}
            Service Version: ${{ needs.resolve-inputs.outputs.service_version }}
            Model Version: ${{ needs.resolve-inputs.outputs.model_version }}
            Environment: production

      - name: Deploy to production host
        env:
          SERVICE_NAME: ${{ needs.resolve-inputs.outputs.service_name }}
          SERVICE_VERSION: ${{ needs.resolve-inputs.outputs.service_version }}
          MODEL_VERSION: ${{ needs.resolve-inputs.outputs.model_version }}
          REGISTRY_ID: ${{ needs.load-config.outputs.registry_id }}
          BASTION_IP: ${{ needs.load-config.outputs.bastion_ip }}
          BASTION_USER: ${{ needs.load-config.outputs.bastion_user }}
          DB_HOST: ${{ needs.load-config.outputs.db_host }}
          KMS_KEY_ID: ${{ needs.load-config.outputs.kms_key_id }}
          HOST_PORT: ${{ needs.load-config.outputs.host_port }}
          ML_SERVICE_API_VERSION: ${{ env.ML_SERVICE_API_VERSION }}
          REPO_URL: https://${{ secrets.REPO_HOST_USER }}:${{ secrets.REPO_HOST_PASSWORD }}@github.com/${{ github.repository }}.git
          YANDEX_SA_JSON: ${{ secrets.YC_PRODUCTION_SA_JSON }}
          TARGET_IP: ${{ matrix.host_ip }}
        run: |
          set -euo pipefail

          case "${SERVICE_NAME}" in
            stockpile-volume)
              IMAGE_SUFFIX="stockpile"
              PORT=8001
              HEALTH_PATH="stockpile/health"
              MEMORY_LIMIT="8G"
              MEMORY_RESERVATION="4G"
              ;;
            hotspot-detection)
              IMAGE_SUFFIX="hotspot"
              PORT=8002
              HEALTH_PATH="hotspots/health"
              MEMORY_LIMIT="4G"
              MEMORY_RESERVATION="2G"
              ;;
            object-detection)
              IMAGE_SUFFIX="object-detect"
              PORT=8003
              HEALTH_PATH="object-detection/health"
              MEMORY_LIMIT="8G"
              MEMORY_RESERVATION="4G"
              ;;
            object-segmentation)
              IMAGE_SUFFIX="segment"
              PORT=8004
              HEALTH_PATH="segmentation/health"
              MEMORY_LIMIT="6G"
              MEMORY_RESERVATION="3G"
              ;;
            d3-reconstruction)
              IMAGE_SUFFIX="d3"
              PORT=8005
              HEALTH_PATH="d3-reconstruction/health"
              MEMORY_LIMIT="12G"
              MEMORY_RESERVATION="8G"
              ;;
            orthomosaic)
              IMAGE_SUFFIX="ortho"
              PORT=8006
              HEALTH_PATH="orthomosaic/health"
              MEMORY_LIMIT="8G"
              MEMORY_RESERVATION="4G"
              ;;
            overlap-analysis)
              IMAGE_SUFFIX="overlap"
              PORT=8007
              HEALTH_PATH="overlap/health"
              MEMORY_LIMIT="4G"
              MEMORY_RESERVATION="2G"
              ;;
            *)
              echo "Unknown service: ${SERVICE_NAME}"
              exit 1
              ;;
          esac

          ssh -o StrictHostKeyChecking=no -J "${BASTION_USER}@${BASTION_IP}" ubuntu@"$TARGET_IP" \
            "SERVICE_NAME='$SERVICE_NAME' SERVICE_VERSION='$SERVICE_VERSION' MODEL_VERSION='$MODEL_VERSION' IMAGE_SUFFIX='$IMAGE_SUFFIX' PORT='$PORT' HEALTH_PATH='$HEALTH_PATH' MEMORY_LIMIT='$MEMORY_LIMIT' MEMORY_RESERVATION='$MEMORY_RESERVATION' REGISTRY_ID='$REGISTRY_ID' DB_HOST='$DB_HOST' KMS_KEY_ID='$KMS_KEY_ID' ML_SERVICE_API_VERSION='$ML_SERVICE_API_VERSION' REPO_URL='$REPO_URL' YANDEX_SA_JSON='$YANDEX_SA_JSON' ENVIRONMENT='production' bash -s" <<'EOF'
          set -euo pipefail

          APP_DIR="vegamaps_ml"
          NETWORK_NAME="${ENVIRONMENT}-vegamaps-net"
          DOCKER_COMPOSE_FILE="deployment/production/docker-compose.universal.yml"

          cd ~
          if [ ! -d "$APP_DIR" ]; then
            git clone "$REPO_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"
          git fetch origin main
          git checkout main
          git reset --hard origin/main

          if ! docker network ls --format '{{.Name}}' | grep -q "^${NETWORK_NAME}$"; then
            docker network create "$NETWORK_NAME"
          fi

          printf '%s' "$YANDEX_SA_JSON" | docker login --username json_key --password-stdin cr.yandex

          FULL_IMAGE_NAME="vegamaps-ml-${IMAGE_SUFFIX}"
          docker pull "cr.yandex/$REGISTRY_ID/${FULL_IMAGE_NAME}:${ENVIRONMENT}-${SERVICE_VERSION}"
          docker tag "cr.yandex/$REGISTRY_ID/${FULL_IMAGE_NAME}:${ENVIRONMENT}-${SERVICE_VERSION}" "${FULL_IMAGE_NAME}:${SERVICE_VERSION}"

          cat > ".env.${SERVICE_NAME}" <<EOT
          SERVICE_NAME=$SERVICE_NAME
          SERVICE_IMAGE_SUFFIX=$IMAGE_SUFFIX
          SERVICE_PORT=$PORT
          SERVICE_HEALTH_PATH=$HEALTH_PATH
          BLUE_VERSION=$SERVICE_VERSION
          GREEN_VERSION=$SERVICE_VERSION
          ACTIVE_BACKEND=ml-service-green
          REGISTRY=cr.yandex/$REGISTRY_ID
          BLUE_PORT=$PORT
          GREEN_PORT=$((PORT + 100))
          NGINX_PORT=$PORT
          MEMORY_LIMIT=$MEMORY_LIMIT
          MEMORY_RESERVATION=$MEMORY_RESERVATION
          DB_HOST=$DB_HOST
          DB_PORT=5432
          DB_NAME=vegamaps_${ENVIRONMENT}
          KMS_KEY_ID=$KMS_KEY_ID
          MODEL_VERSION=$MODEL_VERSION
          ML_SERVICE_API_VERSION=$ML_SERVICE_API_VERSION
          ENVIRONMENT=$ENVIRONMENT
          LOG_LEVEL=INFO
          WORKERS=4
          EOT

          docker compose --env-file ".env.${SERVICE_NAME}" -f "$DOCKER_COMPOSE_FILE" up -d ml-service-green

          sleep 30
          GREEN_HEALTHY=false
          for i in $(seq 1 10); do
            if docker exec "${SERVICE_NAME}-green" sh -c "curl -fsS http://localhost:${PORT}/api/${ML_SERVICE_API_VERSION}/${HEALTH_PATH} >/dev/null"; then
              GREEN_HEALTHY=true
              break
            fi
            sleep 10
          done

          if [ "$GREEN_HEALTHY" != "true" ]; then
            echo "Green deployment health check failed"
            docker compose --env-file ".env.${SERVICE_NAME}" -f "$DOCKER_COMPOSE_FILE" logs ml-service-green --tail=50
            docker compose --env-file ".env.${SERVICE_NAME}" -f "$DOCKER_COMPOSE_FILE" down ml-service-green || true
            exit 1
          fi

          export ACTIVE_BACKEND="ml-service-green"
          docker compose --env-file ".env.${SERVICE_NAME}" -f "$DOCKER_COMPOSE_FILE" up -d nginx-router
          sleep 10

          if curl -fsS "http://localhost:${PORT}/api/${ML_SERVICE_API_VERSION}/${HEALTH_PATH}" >/dev/null; then
            echo "Switch verification passed"
          else
            echo "Switch verification failed, rolling back..."
            export ACTIVE_BACKEND="ml-service-blue"
            docker compose --env-file ".env.${SERVICE_NAME}" -f "$DOCKER_COMPOSE_FILE" up -d nginx-router
            exit 1
          fi

          docker compose --env-file ".env.${SERVICE_NAME}" -f "$DOCKER_COMPOSE_FILE" up -d --no-deps ml-service-blue
          docker image prune -f --filter "until=168h"
          EOF

  verify-deployment:
    name: Verify ${{ needs.resolve-inputs.outputs.service_name }} Deployment
    runs-on: [self-hosted, linux, x64]
    needs: [resolve-inputs, deploy-production]
    if: always()
    steps:
      - name: Smoke note
        run: |
          echo "Deployment finished for ${{ needs.resolve-inputs.outputs.service_name }} v${{ needs.resolve-inputs.outputs.service_version }}"